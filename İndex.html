<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kerem</title>

    <style>
        body{
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background: linear-gradient(
                90deg,
                rgb(255,0,0),
                rgb(0,255,0),
                rgb(0,0,255),
                rgb(255,0,0)
            );
            background-size:400% 400%;
            animation: rgb 6s linear infinite;
        }

        @keyframes rgb{
            0%{background-position:0% 50%;}
            100%{background-position:100% 50%;}
        }

        h1{
            color:white;
            font-size:80px;
            font-family:Arial, sans-serif;
            text-shadow:0 0 20px white;
        }
    </style>
</head>

<body>
    <h1>Kerem
</body>
</html>
